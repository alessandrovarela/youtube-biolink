<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: center; gap: 16px; }
  .meta { width: 110px; font-family: var(--font-mono); font-size: 11px; color: var(--color-muted-fg); }
  .bar { height: 14px; background: var(--color-accent); border-radius: 4px; }
</style>
</head>
<body>
  <div class="row"><div class="meta">--space-1 · 4</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="meta">--space-2 · 8</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="meta">--space-3 · 12</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="meta">--space-4 · 16</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="meta">--space-5 · 20</div><div class="bar" style="width:20px"></div></div>
  <div class="row"><div class="meta">--space-6 · 24</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="meta">--space-8 · 32</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="meta">--space-10 · 40</div><div class="bar" style="width:40px"></div></div>
  <div class="row"><div class="meta">--space-12 · 64</div><div class="bar" style="width:64px"></div></div>
</body>
</html>
