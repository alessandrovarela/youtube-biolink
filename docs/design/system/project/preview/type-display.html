<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Type — Display & Headings</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px dashed var(--color-border); }
  .row:last-child { border-bottom: 0; }
  .meta { width: 110px; flex-shrink: 0; font-size: var(--text-xs); color: var(--color-muted-fg); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">36 / 40 / 700</div>
    <div style="font-size:36px;line-height:40px;font-weight:700;letter-spacing:-0.02em">Sua página de links</div>
  </div>
  <div class="row">
    <div class="meta">30 / 36 / 700</div>
    <div style="font-size:30px;line-height:36px;font-weight:700;letter-spacing:-0.02em">Compartilhe tudo num lugar só</div>
  </div>
  <div class="row">
    <div class="meta">24 / 32 / 600</div>
    <div style="font-size:24px;line-height:32px;font-weight:600;letter-spacing:-0.01em">Editar perfil</div>
  </div>
  <div class="row">
    <div class="meta">20 / 28 / 600</div>
    <div style="font-size:20px;line-height:28px;font-weight:600">Aparência</div>
  </div>
  <div class="row">
    <div class="meta">18 / 28 / 600</div>
    <div style="font-size:18px;line-height:28px;font-weight:600">Meus links</div>
  </div>
</body>
</html>
