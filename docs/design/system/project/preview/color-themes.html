<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Color — Themes</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .swatch { border-radius: var(--radius-lg); padding: 18px; min-height: 200px; display: flex; flex-direction: column; gap: 12px; }
  .swatch.light  { background: #FFFFFF; color: #0F172A; box-shadow: 0 1px 2px rgba(15,23,42,.06); border: 1px solid #E2E8F0; }
  .swatch.dark   { background: #0B1220; color: #E5E7EB; border: 1px solid #243046; }
  .swatch.accent { background: #FAF7F2; color: #1A1410; border: 1px solid #E5DBC8; }
  .name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .hint { font-size: 12px; opacity: 0.7; }
  .row { display: flex; gap: 8px; align-items: center; }
  .chip { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); }
  .chip.dark-bg { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1); }
  .hex { font-family: var(--font-mono); font-size: 11px; opacity: 0.7; }
  .accent-pill { display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; }
</style>
</head>
<body>
  <div class="swatch light">
    <div class="name">light</div>
    <div class="row"><div class="chip" style="background:#FFFFFF"></div><span class="hex">bg #FFFFFF</span></div>
    <div class="row"><div class="chip" style="background:#0F172A"></div><span class="hex">fg #0F172A</span></div>
    <div class="row"><div class="chip" style="background:#2563EB"></div><span class="hex">accent #2563EB</span></div>
    <span class="accent-pill" style="background:#2563EB;color:#fff;align-self:flex-start;margin-top:auto">Padrão</span>
  </div>
  <div class="swatch dark">
    <div class="name">dark</div>
    <div class="row"><div class="chip dark-bg" style="background:#0B1220"></div><span class="hex">bg #0B1220</span></div>
    <div class="row"><div class="chip" style="background:#E5E7EB"></div><span class="hex">fg #E5E7EB</span></div>
    <div class="row"><div class="chip" style="background:#60A5FA"></div><span class="hex">accent #60A5FA</span></div>
    <span class="accent-pill" style="background:#60A5FA;color:#0B1220;align-self:flex-start;margin-top:auto">Tema escuro</span>
  </div>
  <div class="swatch accent">
    <div class="name">accent</div>
    <div class="row"><div class="chip" style="background:#FAF7F2"></div><span class="hex">bg #FAF7F2</span></div>
    <div class="row"><div class="chip" style="background:#1A1410"></div><span class="hex">fg #1A1410</span></div>
    <div class="row"><div class="chip" style="background:#D97757"></div><span class="hex">accent #D97757</span></div>
    <span class="accent-pill" style="background:#D97757;color:#fff;align-self:flex-start;margin-top:auto">Marca</span>
  </div>
</body>
</html>
