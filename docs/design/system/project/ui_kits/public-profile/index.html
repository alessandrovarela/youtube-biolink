<!doctype html>
<html lang="pt-BR" class="theme-light">
<head>
<meta charset="utf-8" />
<title>Biolink · Public Profile</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { min-height: 100vh; }
  body { margin: 0; }
  .theme-switch {
    position: fixed; top: 16px; right: 16px; z-index: 10;
    display: inline-flex; padding: 4px; border-radius: 999px;
    background: var(--color-muted); border: 1px solid var(--color-border);
    font-size: 12px;
  }
  .theme-switch button {
    border: 0; background: transparent; padding: 6px 12px; border-radius: 999px;
    cursor: pointer; color: var(--color-muted-fg); font: inherit;
  }
  .theme-switch button.active {
    background: var(--color-bg); color: var(--color-fg); box-shadow: var(--shadow-sm);
  }

  .public-page {
    max-width: var(--max-public);
    margin: 0 auto;
    padding: 64px 24px 48px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    gap: 12px;
  }
  .avatar {
    border-radius: 999px; overflow: hidden;
    background: var(--color-muted); color: var(--color-fg);
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 600;
    margin-bottom: 12px;
    border: 1px solid var(--color-border);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .display-name {
    font-size: 24px; font-weight: 700; letter-spacing: -0.01em; margin: 0;
  }
  .username {
    font-size: 14px; color: var(--color-muted-fg); font-family: var(--font-mono);
  }
  .bio {
    margin: 8px 0 0; font-size: 15px; line-height: 22px; color: var(--color-fg);
    max-width: 360px;
  }

  .link-list {
    width: 100%; display: flex; flex-direction: column; gap: 12px;
    margin-top: 24px;
  }
  .link-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
    text-decoration: none;
    color: var(--color-fg);
    font-weight: 500;
    transition: transform 120ms var(--ease-out), box-shadow 150ms var(--ease-out), background 150ms var(--ease-out);
  }
  html.theme-dark .link-row { box-shadow: none; }
  .link-row:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  html.theme-dark .link-row:hover { background: var(--color-muted); transform: translateY(-1px); }
  .link-row:active { transform: scale(0.99); }
  .link-title { font-size: 15px; }
  .link-arrow { color: var(--color-muted-fg); }

  .public-footer {
    margin-top: 40px;
    font-size: 12px; color: var(--color-muted-fg);
  }
  .public-footer a {
    color: var(--color-accent); text-decoration: none; font-weight: 600;
  }
  .public-footer a:hover { text-decoration: underline; }

  .toast-mount { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 20; }
  .toast {
    background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
    border: 1px solid var(--color-border); border-radius: 10px;
    padding: 10px 14px; font-size: 14px;
    box-shadow: var(--shadow-md);
    display: flex; align-items: center; gap: 8px;
    animation: pop 200ms var(--ease-out);
  }
  html.theme-dark .toast { background: rgba(11,18,32,0.92); }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div class="theme-switch" role="tablist" aria-label="Tema">
    <button data-theme="light" class="active">light</button>
    <button data-theme="dark">dark</button>
    <button data-theme="accent">accent</button>
  </div>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="PublicProfile.jsx"></script>
  <script type="text/babel">
    const profile = {
      username: "alessandro",
      display_name: "Alessandro Varela",
      bio: "Engenheiro fullstack ensinando Next.js + Supabase em público. Open-source.",
      avatar_url: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=256&h=256&fit=crop",
      theme: "light"
    };
    const links = [
      { id: "1", title: "Curso de Next.js + Supabase", url: "https://example.com/curso" },
      { id: "2", title: "Repositório no GitHub", url: "https://github.com/alessandro/youtube-biolink" },
      { id: "3", title: "Newsletter semanal", url: "https://example.com/newsletter" },
      { id: "4", title: "Canal no YouTube", url: "https://youtube.com/@alessandro" },
      { id: "5", title: "Discord da comunidade", url: "https://discord.gg/example" },
    ];

    function App() {
      const [toast, setToast] = React.useState(null);
      const onLinkClick = (id) => {
        const link = links.find(l => l.id === id);
        setToast(`Clique registrado: ${link.title}`);
        setTimeout(() => setToast(null), 2400);
      };
      return (
        <>
          <PublicProfile profile={profile} links={links} onLinkClick={onLinkClick} />
          {toast && (
            <div className="toast-mount">
              <div className="toast">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                {toast}
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    // theme switch
    document.querySelectorAll(".theme-switch button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".theme-switch button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.documentElement.className = "theme-" + btn.dataset.theme;
      });
    });
  </script>
</body>
</html>
