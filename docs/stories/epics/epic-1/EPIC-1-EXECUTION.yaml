  # ──────────────────────────────────────────────────────────
  # WAVES
  # ──────────────────────────────────────────────────────────
  #
  # Estrutura de dependências:
  #   1.1 ✓ Done
  #   Wave 1: [1.2, 1.3]         — tooling puro, independentes entre si
  #   Wave 2: [1.4, 1.5]         — infra (ambas dependem de Wave 1)
  #   Wave 3: [1.6]              — deploy (depende de 1.4 + 1.5)
  #   Wave 4: [1.7, 1.8]         — canary + docs (1.7 depende de 1.4+1.6, 1.8 depende de 1.5)
  # ──────────────────────────────────────────────────────────

  waves:
    - number: 1
      name: "Tooling"
      description: "ESLint/Prettier/commitlint e Vitest — ferramentas base, sem dependências externas"
      stories: ["1.2", "1.3"]
      parallel: true
      gate_agent: "@architect"
      gate_focus: >-
        Verificar que lint + format + commitlint estão configurados corretamente e que
        Vitest roda a suíte exemplo sem erros. Confirmar que as duas stories não
        introduziram conflitos de configuração.
      merge_order: ["1.2", "1.3"]
      tag: "epic-1-wave-1-tooling"

    - number: 2
      name: "Infraestrutura"
      description: "Supabase Cloud (DB baseline) e GitHub Actions CI — requer Wave 1 completa"
      stories: ["1.4", "1.5"]
      parallel: true
      gate_agent: "@architect"
      gate_focus: >-
        Verificar que migration baseline foi aplicada em ambos os projetos Supabase Cloud,
        que o CI roda com sucesso (lint + test + build) e que os secrets do GitHub estão
        configurados. Testar que a suíte de integração conecta ao Supabase development.
      merge_order: ["1.4", "1.5"]
      tag: "epic-1-wave-2-infra"

    - number: 3
      name: "Deploy"
      description: "Vercel deploy automático com preview por PR — requer Wave 2 completa"
      stories: ["1.6"]
      parallel: false
      gate_agent: "@architect"
      gate_focus: >-
        Verificar que merge em main gera deploy na Vercel com as variáveis de produção
        corretas e que PR gera preview URL. Confirmar que Vercel aponta para o banco
        production no deploy de main.
      merge_order: ["1.6"]
      tag: "epic-1-wave-3-deploy"

    - number: 4
      name: "Canary & Docs"
      description: "Rota /health end-to-end e README completo — requer Wave 3 completa"
      stories: ["1.7", "1.8"]
      parallel: true
      gate_agent: "@architect"
      gate_focus: >-
        Verificar que /health retorna 200 com status ok na URL de produção, que DB é
        reachable, que a resposta inclui commit SHA e env. Confirmar que README tem
        badge de CI verde e instruções de setup local funcionam do zero.
      merge_order: ["1.8", "1.7"]
      tag: "epic-1-wave-4-canary-docs"

  # ──────────────────────────────────────────────────────────
  # FINAL GATE
  # ──────────────────────────────────────────────────────────
  final_gate:
    agent: "@architect"
    focus: >-
      Sign-off final do Epic 1 — Fundação & Canary.
      Verificar:
      1. /health retorna 200 na URL de produção Vercel
      2. CI verde em main
      3. pnpm lint + pnpm test + pnpm build passando localmente
      4. Migration baseline aplicada em production e development
      5. README permite clone → setup → pnpm dev em <15min
      6. Conventional commits em todos os PRs do epic
    tag: "epic-1-complete"

  # ──────────────────────────────────────────────────────────
