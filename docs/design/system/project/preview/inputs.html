<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 14px; font-weight: 500; }
  .hint { font-size: 12px; color: var(--color-muted-fg); }
  .err  { font-size: 12px; color: var(--color-danger); }
  input, textarea {
    font-family: inherit; font-size: 14px; padding: 10px 12px;
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-bg); color: var(--color-fg);
  }
  input:focus, textarea:focus { outline: 2px solid var(--color-accent); outline-offset: 2px; border-color: var(--color-accent); }
  .err-input { border-color: var(--color-danger); }
  .toggle { display: inline-flex; align-items: center; gap: 8px; }
  .switch { width: 36px; height: 20px; background: var(--color-muted); border-radius: 999px; position: relative; cursor: pointer; transition: background 150ms; }
  .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: left 150ms; box-shadow: 0 1px 2px rgba(0,0,0,.15); }
  .switch.on { background: var(--color-accent); }
  .switch.on::after { left: 18px; }
</style>
</head>
<body>
  <div class="field">
    <label for="i1">Nome de exibição</label>
    <input id="i1" placeholder="Alessandro Varela" />
    <span class="hint">Aparece no topo da sua página.</span>
  </div>
  <div class="field">
    <label for="i2">Nome de usuário</label>
    <input id="i2" value="alessandro" />
    <span class="hint">Apenas letras minúsculas, números e _.</span>
  </div>
  <div class="field">
    <label for="i3">E-mail</label>
    <input id="i3" class="err-input" value="alessandro@" />
    <span class="err">E-mail inválido.</span>
  </div>
  <div class="field">
    <label for="i4">Bio</label>
    <textarea id="i4" rows="2">Engenheiro fullstack ensinando Next.js + Supabase.</textarea>
    <span class="hint">52/160</span>
  </div>
  <div class="toggle">
    <span class="switch on" role="switch" aria-checked="true"></span>
    <span class="hint">Link ativo</span>
  </div>
  <div class="toggle">
    <span class="switch" role="switch" aria-checked="false"></span>
    <span class="hint">Link oculto</span>
  </div>
</body>
</html>
