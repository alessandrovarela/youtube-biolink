<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Cards & Toasts</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--color-bg); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); display: flex; flex-direction: column; gap: 8px; }
  .meta { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-muted-fg); font-weight: 600; }
  .row { display: flex; align-items: center; gap: 12px; }
  .toast { background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); border-radius: 12px; padding: 12px 14px; box-shadow: var(--shadow-md); border: 1px solid var(--color-border); display: flex; align-items: center; gap: 10px; font-size: 14px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .delta { font-size: 12px; color: var(--color-success); font-weight: 500; }
</style>
</head>
<body>
  <div class="card">
    <span class="meta">Card · resting</span>
    <div class="stat">1.247</div>
    <span class="delta">+82 nos últimos 7 dias</span>
  </div>
  <div class="card" style="box-shadow: var(--shadow-md)">
    <span class="meta">Card · hover</span>
    <div class="row">
      <div style="width:36px;height:36px;border-radius:50%;background:#DBEAFE;color:#2563EB;display:flex;align-items:center;justify-content:center;font-weight:600">AV</div>
      <div>
        <div style="font-weight:600;font-size:14px">Alessandro Varela</div>
        <div class="meta">@alessandro</div>
      </div>
    </div>
  </div>
  <div class="toast">
    <span class="dot" style="background:var(--color-success)"></span>
    <span>Perfil atualizado.</span>
  </div>
  <div class="toast">
    <span class="dot" style="background:var(--color-danger)"></span>
    <span>Não foi possível atualizar o perfil.</span>
  </div>
</body>
</html>
