<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Radii & Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .cell { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .box { width: 100%; height: 70px; background: #FFF; border: 1px solid var(--color-border); }
  .meta { font-size: 11px; font-family: var(--font-mono); color: var(--color-muted-fg); }
  .label { font-size: 12px; font-weight: 600; }
  .shad-sm { box-shadow: var(--shadow-sm); border: 0; background: #FFF; }
  .shad-md { box-shadow: var(--shadow-md); border: 0; background: #FFF; }
</style>
</head>
<body>
  <div class="cell"><div class="box" style="border-radius:6px"></div><span class="label">radius-sm</span><span class="meta">6px</span></div>
  <div class="cell"><div class="box" style="border-radius:10px"></div><span class="label">radius-md</span><span class="meta">10px</span></div>
  <div class="cell"><div class="box" style="border-radius:16px"></div><span class="label">radius-lg</span><span class="meta">16px</span></div>
  <div class="cell"><div class="box" style="border-radius:999px;height:48px;width:120px"></div><span class="label">radius-pill</span><span class="meta">999px</span></div>
  <div class="cell"><div class="box shad-sm" style="border-radius:10px"></div><span class="label">shadow-sm</span><span class="meta">resting cards</span></div>
  <div class="cell"><div class="box shad-md" style="border-radius:10px"></div><span class="label">shadow-md</span><span class="meta">hover · toasts</span></div>
  <div class="cell"><div class="box" style="border-radius:10px;background:#0B1220;border:1px solid #243046"></div><span class="label">elevation-dark</span><span class="meta">1px border</span></div>
  <div class="cell"><div class="box" style="border-radius:10px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);box-shadow:var(--shadow-md)"></div><span class="label">backdrop-blur</span><span class="meta">toasts · sticky</span></div>
</body>
</html>
