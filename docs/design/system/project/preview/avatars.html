<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Avatars</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .av { border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; background: var(--color-muted); color: var(--color-fg); overflow: hidden; flex-shrink: 0; }
  .lbl { font-size: 11px; color: var(--color-muted-fg); font-family: var(--font-mono); margin-top: 6px; text-align: center; }
  .stack { display: flex; flex-direction: column; align-items: center; }
  img { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>
  <div class="stack">
    <div class="av" style="width:24px;height:24px;font-size:10px">AV</div>
    <span class="lbl">24</span>
  </div>
  <div class="stack">
    <div class="av" style="width:32px;height:32px;font-size:12px">AV</div>
    <span class="lbl">32</span>
  </div>
  <div class="stack">
    <div class="av" style="width:48px;height:48px;font-size:16px">AV</div>
    <span class="lbl">48</span>
  </div>
  <div class="stack">
    <div class="av" style="width:64px;height:64px;font-size:22px">AV</div>
    <span class="lbl">64</span>
  </div>
  <div class="stack">
    <div class="av" style="width:96px;height:96px;font-size:32px">AV</div>
    <span class="lbl">96 fallback</span>
  </div>
  <div class="stack">
    <div class="av" style="width:96px;height:96px"><img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200&h=200&fit=crop" alt=""/></div>
    <span class="lbl">96 image</span>
  </div>
</body>
</html>
